<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Страница без текста</title>
    <style>
        /* Центрируем содержимое по вертикали и горизонтали */
        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            background-color: #f0f0f0; 
        }
        img { 
            max-width: 80%; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            margin-bottom: 30px; 
        }
        audio {
            width: 300px;
        }
    </style>
</head>
<body>

    <img src="image.jpeg" alt="Изображение">

    <audio controls>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

</body>
</html>
