<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Прикол на 1 Апреля!</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
            min-height: 100vh; 
            background-color: #f0f0f0; 
            font-family: sans-serif;
            text-align: center;
        }

        img { 
            max-width: 95%; 
            height: auto; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            margin-top: 20px; 
            margin-bottom: 20px; 
        }

        .instruction-text {
            font-size: 20px;
            color: #333;
            margin-bottom: 15px; 
            font-weight: bold;
        }

        audio {
            width: 90%; 
            max-width: 400px; 
            margin-bottom: 30px; 
        }
    </style>
</head>
<body onclick="playAudio()"> <img src="image.jpeg" alt="С 1 Апреля!">

    <audio id="myAudio" controls autoplay>
        <source src="music.mp3" type="audio/mpeg">
        Ваш браузер не поддерживает элемент audio.
    </audio>

    <script>
        function playAudio() {
            var audio = document.getElementById("myAudio");
            audio.play();
        }
    </script>

</body>
</html>
